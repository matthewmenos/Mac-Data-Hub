<nav class="dash-sidebar" id="reseller-sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-brand-icon">M</div>
    <div>
      <div class="sidebar-brand-name">Mac Data Hub</div>
      <div class="sidebar-brand-role">Reseller</div>
    </div>
    <button class="sidebar-close" id="sidebar-close" aria-label="Close menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section-label">My Store</div>

    <a href="/dashboard" class="nav-item {% if request.path == '/dashboard' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Overview
    </a>

    <a href="/dashboard/pricing" class="nav-item {% if '/pricing' in request.path %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      Set Prices
    </a>

    <a href="/dashboard/orders" class="nav-item {% if '/orders' in request.path %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      My Orders
    </a>

    <a href="/dashboard/wallet" class="nav-item {% if '/wallet' in request.path %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      Wallet
    </a>

    <div class="nav-section-label" style="margin-top:.75rem">Settings</div>

    <a href="/dashboard/store" class="nav-item {% if '/store' in request.path %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Store Settings
    </a>

    {% if whatsapp_channel_url %}
    <a href="{{ whatsapp_channel_url }}" target="_blank" rel="noopener" class="nav-item" style="color:#25D366">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      Join WhatsApp Channel
    </a>
    {% endif %}
  </nav>

  <div class="sidebar-user">
    <div class="sidebar-avatar">{{ session.get('full_name', 'R')[0]|upper }}</div>
    <div>
      <div class="sidebar-user-name">{{ session.get('full_name', 'Reseller') }}</div>
      <div class="sidebar-user-email">Reseller account</div>
    </div>
    <a href="/logout" class="sidebar-logout" title="Sign out">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </a>
  </div>
</nav>

<div class="sidebar-overlay hidden" id="sidebar-overlay"></div>

<script>
  (function () {
    const sidebar  = document.getElementById('reseller-sidebar');
    const overlay  = document.getElementById('sidebar-overlay');
    const closeBtn = document.getElementById('sidebar-close');
    const toggler  = document.getElementById('sidebar-toggle');

    function openSidebar()  { sidebar?.classList.add('open');    overlay?.classList.remove('hidden'); }
    function closeSidebar() { sidebar?.classList.remove('open'); overlay?.classList.add('hidden'); }

    toggler?.addEventListener('click', openSidebar);
    closeBtn?.addEventListener('click', closeSidebar);
    overlay?.addEventListener('click', closeSidebar);
  })();
</script>
