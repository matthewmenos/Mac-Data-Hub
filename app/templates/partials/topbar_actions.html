<div class="topbar-actions">

  <!-- Notification bell -->
  <div class="notif-wrap">
    <button class="notif-btn" id="notif-btn" onclick="toggleNotifDropdown()" aria-label="Notifications">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="notif-badge hidden" id="notif-badge">0</span>
    </button>

    <div class="notif-dropdown" id="notif-dropdown">
      <div class="notif-header">
        <span class="notif-header-title">Notifications</span>
        <button class="notif-mark-all" onclick="markAllRead()">Mark all read</button>
      </div>

      <div class="notif-list" id="notif-list">
        <div class="notif-empty" id="notif-empty">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <div>You're all caught up!</div>
        </div>
      </div>

      <div class="notif-footer">
        <a href="#" id="notif-all-link">View all</a>
      </div>
    </div>
  </div>

  <!-- Dark / Light toggle -->
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
    <svg class="icon-moon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <svg class="icon-sun" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

</div>

<!-- Embed the notification endpoint so main.js can fetch it without hardcoding role-specific paths -->
<script>
window._NOTIF_URL = "{{ url_for('admin.notifications') if session.get('role') == 'admin' else url_for('reseller.notifications') }}";
window._NOTIF_ALL = "{{ '/admin/orders' if session.get('role') == 'admin' else '/dashboard/orders' }}";
</script>
